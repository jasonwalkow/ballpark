<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Ballpark Design Tools</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="./icon.png" />
    <link rel="stylesheet" href="./fonts.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./tailwind-config.js"></script>
  </head>
  <body class="font-brand antialiased">
    <!-- Looping video background (behind #root) -->
    <video
      class="bp-bg-video"
      src="./videos/homerun-dots.webm"
      autoplay
      preload="auto"
      muted
      loop
      playsinline
      aria-hidden="true"
    ></video>
    <script>
      (function () {
        const rate = 0.65; // slower playback for the bg loop
        const v = document.querySelector('video.bp-bg-video');
        if (!v) return;

        const apply = function () {
          try {
            v.playbackRate = rate;
            // Ensure playback starts with the new rate.
            v.play().catch(() => {});
          } catch (e) {}
        };

        if (v.readyState >= 2) apply();
        v.addEventListener('loadedmetadata', apply, { once: true });
      })();
    </script>
    <div id="root"></div>

    <!-- React / ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

    <!-- Babel for JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- App code split into logical files -->
    <script type="text/babel" src="./hamburger-menu.jsx"></script>
    <script type="text/babel" src="./landing-page.jsx"></script>
    <script type="text/babel" src="./dot-matrix-icon.jsx"></script>
    <script type="text/babel" src="./dot-matrix-art.jsx"></script>
    <script type="text/babel" src="./dot-pattern-generator.jsx"></script>
    <script type="text/babel" src="./dot-billboard.jsx"></script>
    <script type="text/babel" src="./dot-matrix-video.jsx"></script>
    <script type="text/babel" src="./ballparkify.jsx"></script>
    <script type="text/babel" src="./App.jsx"></script>
  </body>
  </html>
